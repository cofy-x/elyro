name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go test, vet, race, and vulnerability scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify module checksums
        run: go mod verify
      - name: Check formatting
        run: |
          unformatted="$(find cmd internal scripts/images/report skills -type f -name '*.go' -print0 | xargs -0 gofmt -l)"
          test -z "${unformatted}"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Targeted race tests
        run: go test -race ./internal/workspace/...
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

  shell:
    name: Shell syntax and ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Check Bash syntax
        run: find . -type f -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -n1 bash -n
      - name: Run ShellCheck
        run: find . -type f -name '*.sh' -not -path './.git/*' -print0 | xargs -0 shellcheck --severity=error
      - name: Verify release inputs
        run: scripts/ci/check-release-inputs.sh
      - name: Smoke release installer
        run: scripts/ci/install-release-smoke.sh

  secrets:
    name: Secret scan
    runs-on: ubuntu-24.04
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          install_dir="${RUNNER_TEMP}/gitleaks"
          mkdir -p "${install_dir}"
          curl --fail --location --silent --show-error \
            --retry 3 --retry-all-errors --connect-timeout 15 --max-time 120 \
            --output "${RUNNER_TEMP}/${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          echo "${GITLEAKS_LINUX_X64_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum --check --strict
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${install_dir}" gitleaks
          echo "${install_dir}" >> "${GITHUB_PATH}"
      - name: Scan Git history for secrets
        run: gitleaks git --redact --no-banner --platform github --timeout 300 .

  docs:
    name: Documentation links
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --no-progress --exclude-loopback --accept 200,204,206,429
            AGENTS.md README.md CONTRIBUTING.md SECURITY.md
            docs/**/*.md .x/*.md images/**/*.md
          fail: true

  release-config:
    name: Release and package-manager configuration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.13.3
          args: check
      - name: Smoke Homebrew formula generation
        run: scripts/ci/homebrew-formula-smoke.sh
      - name: Verify candidate image scripts
        run: scripts/ci/candidate-images-test.sh

  homebrew-install:
    name: Homebrew formula installation
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build and install through a local formula
        env:
          ELYRO_HOMEBREW_INSTALL_SMOKE: '1'
        run: scripts/ci/homebrew-formula-smoke.sh
