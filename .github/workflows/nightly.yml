name: Nightly core matrix

on:
  schedule:
    - cron: '23 18 * * *'
  workflow_dispatch:
    inputs:
      release_version:
        description: Exact release version reviewed in release/versions.env
        required: true
        type: string

jobs:
  core-images:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Verify fixed inputs
        run: scripts/ci/check-release-inputs.sh "${{ inputs.release_version }}"
      - name: Log in to GHCR for candidate publication
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build core images
        env:
          ELYRO_BUILD_PLATFORM: ${{ matrix.platform }}
          ELYRO_BUILD_VERSION: dev
          ELYRO_BUILD_IMAGE_PREFIX: ${{ github.event_name == 'workflow_dispatch' && 'ghcr.io/cofy-x/elyro' || 'elyro' }}
          ELYRO_BUILD_SOURCE: ${{ github.server_url }}/${{ github.repository }}
          ELYRO_BUILD_VERSION_LABEL: candidate-${{ github.sha }}-${{ github.run_id }}
          ELYRO_BUILD_REVISION: ${{ github.sha }}
        run: scripts/ci/build-core-images.sh
      - name: Smoke core images
        env:
          ELYRO_BUILD_PLATFORM: ${{ matrix.platform }}
          ELYRO_BUILD_VERSION: dev
          ELYRO_BUILD_IMAGE_PREFIX: ${{ github.event_name == 'workflow_dispatch' && 'ghcr.io/cofy-x/elyro' || 'elyro' }}
        run: scripts/ci/smoke-core-images.sh
      - name: Workspace end-to-end
        env:
          ELYRO_IMAGE_PREFIX: ${{ github.event_name == 'workflow_dispatch' && 'ghcr.io/cofy-x/elyro' || 'elyro' }}
        run: make workspace-e2e
      - name: Push immutable per-architecture candidates
        if: github.event_name == 'workflow_dispatch'
        env:
          ELYRO_BUILD_PLATFORM: ${{ matrix.platform }}
          ELYRO_BUILD_VERSION: dev
          ELYRO_BUILD_IMAGE_PREFIX: ghcr.io/cofy-x/elyro
          ELYRO_CANDIDATE_TAG: candidate-${{ github.sha }}-${{ github.run_id }}
        run: scripts/ci/push-candidate-images.sh

  candidate-images:
    if: github.event_name == 'workflow_dispatch'
    needs: core-images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge candidate manifests
        env:
          ELYRO_BUILD_IMAGE_PREFIX: ghcr.io/cofy-x/elyro
          ELYRO_CANDIDATE_TAG: candidate-${{ github.sha }}-${{ github.run_id }}
        run: scripts/ci/merge-candidate-images.sh
      - name: Verify candidate contract and image budgets
        run: |
          source release/versions.env
          go run ./scripts/images/report \
            --version "candidate-${{ github.sha }}-${{ github.run_id }}" \
            --allow-candidate \
            --compare-version "${ELYRO_COMPARE_VERSION}" \
            --image-prefix ghcr.io/cofy-x/elyro \
            --expected-revision "${{ github.sha }}" \
            --expected-source "${{ github.server_url }}/${{ github.repository }}" \
            --budget-file release/image-budgets.json \
            --top-layers 1
